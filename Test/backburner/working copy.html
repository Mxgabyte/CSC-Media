<!DOCTYPE html>
<html>
<head>
<title>CSC Week Preview</title>

<style>

/* ===== BODY / BACKGROUND ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background:
    radial-gradient(circle at top left, rgba(96,165,250,0.15), transparent 40%),
    radial-gradient(circle at bottom right, rgba(34,197,94,0.12), transparent 40%),
    linear-gradient(180deg, #020617, #020617);
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #60a5fa, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* PANELS */
.panel {
  width: 50%;
  padding: 10px;
  background: linear-gradient(180deg, rgba(15,23,42,0.9), rgba(2,6,23,0.95));
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 10px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.section-title {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
}

/* =========================
   ✅ RANKINGS (FLUID)
========================= */

.rank-row {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px;
  border-bottom: 1px solid rgba(148,163,184,0.1);
}

.rank-row.top1 {
  background: linear-gradient(90deg, rgba(34,197,94,0.15), transparent);
}

.rank-row.top2 {
  background: linear-gradient(90deg, rgba(96,165,250,0.15), transparent);
}

.rank-row.top3 {
  background: linear-gradient(90deg, rgba(250,204,21,0.15), transparent);
}

.rank-num {
  font-size: 26px;
  font-weight: bold;
  width: 30px;
  text-align: center;
  flex-shrink: 0;
}

/* LOGOS */
.logo {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
}

.logo-fallback {
  width: 56px;
  height: 56px;
  background: #1f2937;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}

/* TEAM INFO */
.team-info {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.team-top {
  display: flex;
  justify-content: space-between;
}

.team-name {
  font-size: 16px;
  font-weight: bold;
}

.team-record {
  font-size: 12px;
  color: #60a5fa;
}

/* VOTES */
.vote-line {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.vote-item {
  background: linear-gradient(180deg, #020617, #0f172a);
  border: 1px solid rgba(96,165,250,0.2);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: bold;
  display: flex;
  gap: 6px;
}

/* =========================
   ✅ TIERS
========================= */

.tier-header {
  font-size: 12px;
  padding: 8px 10px;
  margin-top: 12px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-weight: bold;
}

.tier-contenders {
  background: linear-gradient(90deg, rgba(34,197,94,0.2), transparent);
  border-left: 4px solid #22c55e;
}

.tier-mix {
  background: linear-gradient(90deg, rgba(96,165,250,0.2), transparent);
  border-left: 4px solid #60a5fa;
}

.tier-chasing {
  background: linear-gradient(90deg, rgba(250,204,21,0.2), transparent);
  border-left: 4px solid #facc15;
}

/* =========================
   ✅ MATCHES (unchanged stable)
========================= */

.match {
  width: 100%;
}

.grid {
  display: grid;
}

.grid-header {
  padding: 8px;
  border-bottom: 1px solid #1f2937;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
}

.matchup {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #1f2937;
}

.team-block {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.team-name-small {
  font-size: 11px;
  margin-top: 4px;
}

.pick-cell {
  display: flex;
  justify-content: center;
  align-items: center;
}

.match .logo {
  width: 32px;
  height: 32px;
}

</style>
</head>

<body>

<div class="header">CSC WEEK PREVIEW</div>

<div class="container">

  <div class="panel">
    <div class="section-title">POWER RANKINGS</div>
    <div id="rankings"></div>
  </div>

  <div class="panel">
    <div class="section-title">WEEK MATCHUPS</div>
    <div id="matches"></div>
  </div>

</div>

<script>

const rankingsURL = "https://opensheet.elk.sh/1tbsD14I19C3fPTcmXoDf4VbJfwO16gy2jkBGz19bzmI/Master%20Data";
const predictionsURL = "https://opensheet.elk.sh/1r2C35xDoI9wr8pF4dHzd9niqAkx3yJ5xwDF3KlM7K7Y/Picks%2FRecords";
const logosURL = "https://opensheet.elk.sh/1vx2l-UI_eUlrz8b6f3vca24tUAfqO5w8_kmZsHxVSmw/logos";

async function init() {

  const [rankData, predData, logoData] = await Promise.all([
    fetch(rankingsURL).then(r => r.json()),
    fetch(predictionsURL).then(r => r.json()),
    fetch(logosURL).then(r => r.json())
  ]);

  const logoMap = {};
  logoData.forEach(row => {
    const vals = Object.values(row);
    const team = (vals[0] || "").trim().toUpperCase();
    const logo = (vals[1] || "").trim();
    if (team && logo) logoMap[team] = logo;
  });

  buildRankings(rankData, logoMap);
  buildMatches(predData, logoMap);
}

function getLogoHTML(team, logoMap) {
  if (logoMap[team]) {
    return `<img class="logo" src="${logoMap[team]}">`;
  } else {
    return `<div class="logo-fallback">${team}</div>`;
  }
}

/* COLOR SCALE */
function getRankColor(val) {
  if (val <= 1) return "#22c55e";
  if (val === 2) return "#4ade80";
  if (val === 3) return "#facc15";
  if (val === 4) return "#fb923c";
  return "#ef4444";
}

/* TIERS */
function getTier(rank) {
  if (rank <= 3) return { name: "CONTENDERS", class: "tier-contenders" };
  if (rank <= 7) return { name: "IN THE MIX", class: "tier-mix" };
  return { name: "CHASING PACK", class: "tier-chasing" };
}

/* BUILD RANKINGS */
function buildRankings(data, logoMap) {

  const container = document.getElementById("rankings");
  container.innerHTML = "";

  const headers = Object.keys(data[0]);
  let rank = 1;
  let currentTier = "";

  data.forEach(row => {

    const team = row[headers[0]];
    if (!team) return;

    const tier = getTier(rank);
    if (tier.name !== currentTier) {
      container.innerHTML += `<div class="tier-header ${tier.class}">${tier.name}</div>`;
      currentTier = tier.name;
    }

    const rankClass =
      rank === 1 ? "top1" :
      rank === 2 ? "top2" :
      rank === 3 ? "top3" : "";

    let voteHTML = "";

    headers.forEach(header => {

      const name = header.toLowerCase().trim();
      if (["teams","avg rank","final rank",""].includes(name)) return;

      const val = row[header];
      if (!val || isNaN(val)) return;

      voteHTML += `
        <div class="vote-item">
          <span>${header}</span>
          <span style="color:${getRankColor(val)}">${val}</span>
        </div>
      `;
    });

    container.innerHTML += `
      <div class="rank-row ${rankClass}">
        <div class="rank-num">${rank++}</div>

        ${getLogoHTML(team.toUpperCase(), logoMap)}

        <div class="team-info">
          <div class="team-top">
            <div class="team-name">${team}</div>
            <div class="team-record">0-0</div>
          </div>
          <div class="vote-line">${voteHTML}</div>
        </div>
      </div>
    `;
  });
}

/* MATCHES */
function buildMatches(data, logoMap) {

  const container = document.getElementById("matches");
  container.innerHTML = "";

  const headers = Object.keys(data[0]);
  const matchColumn = headers[0];

  const writers = headers.slice(1).filter(w => {
    const name = w.toLowerCase();
    return name !== "template" && name !== "winner" && name !== "avg";
  });

  let html = `
    <div class="match">
      <div class="grid" style="grid-template-columns: 220px repeat(${writers.length}, 1fr);">
        <div class="grid-header">MATCHUP</div>
        ${writers.map(w => `<div class="grid-header">${w}</div>`).join("")}
  `;

  data.forEach(row => {

    const match = row[matchColumn];
    if (!match) return;

    const parts = match.split(/vs/i);
    const teamA = parts[0]?.trim();
    const teamB = parts[1]?.trim();

    if (!teamA || !teamB) return;

    html += `
      <div class="matchup">
        <div class="team-block">
          ${getLogoHTML(teamA.toUpperCase(), logoMap)}
          <div class="team-name-small">${teamA}</div>
        </div>
        <div>VS</div>
        <div class="team-block">
          ${getLogoHTML(teamB.toUpperCase(), logoMap)}
          <div class="team-name-small">${teamB}</div>
        </div>
      </div>
    `;

    writers.forEach(w => {
      const pick = row[w] || "";
      html += `<div class="pick-cell">${pick ? getLogoHTML(pick.trim().toUpperCase(), logoMap) : ""}</div>`;
    });

  });

  html += `</div></div>`;
  container.innerHTML = html;
}

init();

</script>

</body>
</html>
