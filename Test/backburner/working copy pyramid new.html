<!DOCTYPE html>
<html>
<head>
<title>CSC Week Preview</title>

<style>

/* =========================
   BASE — BROADCAST LIGHTING SYSTEM
========================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  /* layered broadcast lighting */
  background:
    radial-gradient(circle at 20% 20%, rgba(96,165,250,0.08), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(34,197,94,0.06), transparent 65%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02), transparent 70%),
    linear-gradient(180deg, #020617, #020617);
}

/* =========================
   HEADER — CLEAN BROADCAST TITLE
========================= */

.header {
  padding: 22px;
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  letter-spacing: 2px;

  color: rgba(255,255,255,0.92);
}

/* =========================
   FEATURED MATCH — SPOTLIGHT CARD
========================= */

#featured {
  margin: 18px;
  padding: 14px;
  border-radius: 16px;

  background: radial-gradient(
    circle at top,
    rgba(255,255,255,0.04),
    rgba(15,23,42,0.10)
  );

  border: 1px solid rgba(255,255,255,0.06);

  backdrop-filter: blur(14px);

  text-align: center;
}

.featured-title {
  font-size: 11px;
  letter-spacing: 3px;
  opacity: 0.45;
}

.featured-match {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  margin-top: 10px;
  font-weight: bold;
}

/* =========================
   LAYOUT
========================= */

.container {
  display: flex;
  gap: 18px;
  padding: 18px;
  flex-wrap: wrap;
}

.panel {
  flex: 1;
  min-width: 320px;
}

/* =========================
   LOGO SYSTEM — HERO FOCUS
========================= */

.logo {
  width: 60px;
  height: 60px;
  object-fit: contain;

  filter:
    brightness(1.12)
    contrast(1.05);

  transition: 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* subtle lift instead of glow spam */
.rank-row:hover .logo,
.match-row:hover .logo {
  transform: scale(1.06);
  filter:
    brightness(1.25)
    contrast(1.1);
}

/* =========================
   POWER RANKINGS — FLOATING HIERARCHY
========================= */

#rankings {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.rank-row-group {
  display: flex;
  justify-content: center;
  gap: 10px;
}

/* soft hierarchy depth (feels like stage distance) */
.rank-row-group[data-tier="0"] { opacity: 1; transform: translateY(0px); }
.rank-row-group[data-tier="1"] { opacity: 0.97; }
.rank-row-group[data-tier="2"] { opacity: 0.94; }
.rank-row-group[data-tier="3"] { opacity: 0.90; }
.rank-row-group[data-tier="4"] { opacity: 0.86; }
.rank-row-group[data-tier="5"] { opacity: 0.82; }
.rank-row-group[data-tier="6"] { opacity: 0.78; }

.rank-row {
  width: 110px;
  height: 90px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  gap: 4px;

  background: transparent;
  border: none;

  position: relative;

  transition: 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.rank-row:hover {
  transform: translateY(-4px) scale(1.04);
}

.rank-num {
  font-size: 12px;
  opacity: 0.55;
}

/* movement */
.move-up { color: #22c55e; font-size: 12px; font-weight: bold; }
.move-down { color: #ef4444; font-size: 12px; font-weight: bold; }
.move-same { color: #94a3b8; font-size: 12px; }

/* hover card — cleaner glass */
.hover-card {
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);

  width: 240px;

  background: rgba(10,12,18,0.85);
  border: 1px solid rgba(255,255,255,0.06);

  backdrop-filter: blur(14px);

  border-radius: 12px;
  padding: 10px;

  opacity: 0;
  pointer-events: none;

  transition: 0.2s ease;
}

/* =========================
   MATCHUPS — BROADCAST CARDS
========================= */

#matches {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
}

.match-row {
  flex: 1 1 180px;
  max-width: 220px;

  padding: 10px;
  border-radius: 16px;

  background: transparent;
  border: none;

  display: flex;
  flex-direction: column;
  align-items: center;

  position: relative;

  transition: 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.match-row:hover {
  transform: translateY(-5px) scale(1.02);
}

.matchup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.vs {
  font-size: 11px;
  opacity: 0.32;
  letter-spacing: 2px;
}

/* match popup */
.match-popup {
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);

  width: 240px;

  background: rgba(10,12,18,0.85);
  border: 1px solid rgba(255,255,255,0.06);

  backdrop-filter: blur(14px);

  border-radius: 12px;
  padding: 10px;

  opacity: 0;
  pointer-events: none;

  transition: 0.2s ease;
}

/* =========================
   GLOBAL POPUP FIX (SAFE KEEP)
========================= */

.rank-row,
.match-row {
  position: relative;
  z-index: 1;
}

.rank-row:hover,
.match-row:hover {
  z-index: 999999;
}

.hover-card,
.match-popup {
  z-index: 1000000;
}

/* show popups */
.rank-row:hover .hover-card,
.match-row:hover .match-popup {
  opacity: 1;
  pointer-events: auto;
}
.popup-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  font-size: 12px;
}

/* left side (analyst name) */
.popup-line span:first-child {
  opacity: 0.7;
}

/* right side container */
.popup-line span:last-child {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  min-width: 70px;
  gap: 6px;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }
}
/* =========================
   HARD STACK FIX (RANKINGS)
========================= */

/* each group becomes a safe stacking context */
.rank-row-group {
  position: relative;
  z-index: 1;
}

/* when hovering ANY card, lift the WHOLE group */
.rank-row-group:hover {
  z-index: 999999 !important;
}

/* individual cards still lift slightly */
.rank-row {
  position: relative;
  z-index: 1;
}

.rank-row:hover {
  z-index: 1000000 !important;
}

/* popups ALWAYS win */
.hover-card {
  z-index: 10000000 !important;
}
</style>
</head>

<body>

<div class="header">CSC WEEK PREVIEW</div>

<div id="featured"></div>

<div class="container">
  <div class="panel">
    <div id="rankings"></div>
  </div>

  <div class="panel">
    <div id="matches"></div>
  </div>
</div>

<script>

const rankingsURL = "https://opensheet.elk.sh/1tbsD14I19C3fPTcmXoDf4VbJfwO16gy2jkBGz19bzmI/Master%20Data";
const picksURL = "https://opensheet.elk.sh/1r2C35xDoI9wr8pF4dHzd9niqAkx3yJ5xwDF3KlM7K7Y/Picks%2FRecords";
const logosURL = "https://opensheet.elk.sh/1vx2l-UI_eUlrz8b6f3vca24tUAfqO5w8_kmZsHxVSmw/logos";

async function init() {

  const [rankData, matchData, logoData] = await Promise.all([
    fetch(rankingsURL).then(r => r.json()),
    fetch(picksURL).then(r => r.json()),
    fetch(logosURL).then(r => r.json())
  ]);

  const logos = {};
  logoData.forEach(r => {
    const v = Object.values(r);
    logos[v[0].toUpperCase()] = v[1];
  });

  buildFeatured(matchData, logos);
  buildRankings(rankData, logos);
  buildMatches(matchData, logos);
}

function logo(team, map) {
  return map[team]
    ? `<img class="logo" src="${map[team]}">`
    : team;
}

/* FEATURED */
function buildFeatured(data, logos) {

  const match = data[0]?.Matchup;
  if (!match) return;

  const [a,b] = match.split(/vs/i).map(t=>t.trim());

  document.getElementById("featured").innerHTML = `
    <div class="featured-title">FEATURED MATCHUP</div>
    <div class="featured-match">
      ${logo(a.toUpperCase(),logos)}
      <div>${a} VS ${b}</div>
      ${logo(b.toUpperCase(),logos)}
    </div>
  `;
}

/* RANKINGS */
function buildRankings(data, logos) {

  const container = document.getElementById("rankings");
  container.innerHTML = "";

  const rows = [];
  let i = 0;
  let size = 1;

  while (i < data.length) {

    let row = [];

    for (let j = 0; j < size && i < data.length; j++) {
      row.push(data[i]);
      i++;
    }

    rows.push(row);
    size++;

    if (size > 6) break;
  }

  const last = rows[rows.length - 1];
  while (i < data.length) {
    last.push(data[i]);
    i++;
  }

  rows.forEach((row,tier)=>{

    const group = document.createElement("div");
    group.className = "rank-row-group";
    group.setAttribute("data-tier",tier);

    row.forEach(teamRow=>{

      const team = teamRow.Teams.toUpperCase();

      const diff =
        Number(teamRow["Avg Rank"]) -
        Number(teamRow["Final Rank"]);

      let move =
        diff > 0 ? `<span class="move-up">▲${diff}</span>` :
        diff < 0 ? `<span class="move-down">▼${Math.abs(diff)}</span>` :
        `<span class="move-same">—</span>`;

      const analysts = Object.keys(teamRow).filter(k =>
        !["Teams","Avg Rank","Final Rank"].includes(k)
      );

      let breakdown = "";

      analysts.forEach(a=>{
        const pick = teamRow[a];
        if(!pick) return;

        breakdown += `
          <div>
            <span>${a}</span>
            <span>${logo(pick.toUpperCase(),logos)}</span>
          </div>
        `;
      });

      group.innerHTML += `
        <div class="rank-row">
          ${move}
          ${logo(team,logos)}
          <div class="rank-num">#${teamRow["Final Rank"]}</div>

          <div class="hover-card">
            ${breakdown}
          </div>
        </div>
      `;
    });

    container.appendChild(group);
  });
}

/* MATCHUPS */
function buildMatches(data, logos) {

  const container = document.getElementById("matches");
  container.innerHTML = "";

  const writers = Object.keys(data[0])
    .filter(k => !["Matchup","Winner","Template"].includes(k));

  data.forEach(row=>{

    const match = row.Matchup;
    if(!match) return;

    const [a,b] = match.split(/vs/i).map(t=>t.trim());

    let popup = "";

    writers.forEach(w=>{
      const pick = row[w]?.toUpperCase();
      if(!pick) return;

      popup += `
        <div class="popup-line">
          <span>${w}</span>
          <span>${logo(pick,logos)}</span>
        </div>
      `;
    });

    container.innerHTML += `
      <div class="match-row">

        <div class="matchup">
          ${logo(a.toUpperCase(),logos)}
          <div class="vs">VS</div>
          ${logo(b.toUpperCase(),logos)}
        </div>

        <div class="match-popup">
          ${popup}
        </div>

      </div>
    `;
  });
}

init();

</script>

</body>
</html>
