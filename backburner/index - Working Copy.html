<!DOCTYPE html>
<html>
<head>
<title>CSC Graphic Generator</title>
<meta charset="UTF-8" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
}

.header {
  padding: 22px;
  text-align: center;
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 2px;
}

.menu {
  position: sticky;
  top: 0;
  z-index: 999;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: rgba(2, 6, 23, .95);
  border-bottom: 1px solid rgba(255,255,255,.08);
}

.tier-control {
  display: flex;
  align-items: center;
  gap: 8px;
  color: white;
  font-size: 16px;
  font-weight: 900;
}

.tier-control select {
  background: rgba(15,23,42,.95);
  color: white;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
}

.menu button,
.card-actions button {
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.08);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 800;
  cursor: pointer;
}

.menu button.active {
  background: rgba(96,165,250,.25);
  border-color: rgba(96,165,250,.5);
}

.status {
  text-align: center;
  opacity: .75;
  margin: 15px;
}

.page {
  display: none;
  padding: 24px;
}

.page.active { display: block; }

.gallery {
  display: flex;
  flex-direction: column;
  gap: 30px;
  align-items: center;
}

.graphic-wrap { width: fit-content; }

.card-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.card-copy-overlay {
  position: absolute;
  top: 22px;
  right: 22px;
  z-index: 99999;
  background: rgba(34,197,94,.28);
  border: 2px solid rgba(34,197,94,.75);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 22px;
  font-weight: 1000;
  cursor: pointer;
}

.card-copy-overlay.copied {
  background: rgba(34,197,94,.65);
}

/* =========================
   POWER RANKING CARD
========================= */

.power-card {
  width: 3000px;
  height: 750px;
  transform: scale(.36);
  transform-origin: top center;
  margin-bottom: -470px;

  position: relative;
  overflow: hidden;
  border-radius: 22px;
  border: 6px solid rgba(255,255,255,.14);

  background:
    radial-gradient(circle at 16% 50%, var(--team-primary) 0%, transparent 32%),
    linear-gradient(115deg,
      #1f2937 0%,
      #111827 22%,
      #020617 52%,
      var(--team-secondary) 100%
    );
}

.power-card::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      120deg,
      rgba(180,190,205,.12) 0 8%,
      transparent 8% 24%
    ),

    linear-gradient(
      120deg,
      transparent 0 48%,
      rgba(180,190,205,.08) 48% 51%,
      transparent 51% 100%
    ),

    linear-gradient(
      120deg,
      transparent 0 72%,
      rgba(180,190,205,.06) 72% 74%,
      transparent 74% 100%
    ),

    repeating-linear-gradient(
      120deg,
      rgba(255,255,255,.015) 0px,
      rgba(255,255,255,.015) 2px,
      transparent 2px,
      transparent 34px
    );

  pointer-events: none;
  z-index: 1;
}

.power-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 18% 50%, rgba(255,255,255,.18), transparent 8%),
    radial-gradient(circle at 85% 50%, var(--team-secondary), transparent 65%),
    radial-gradient(circle at 78% 35%, var(--team-accent), transparent 42%),
    linear-gradient(90deg, rgba(0,0,0,.12), transparent 42%, rgba(0,0,0,.30));
  opacity: .28;
  z-index: 2;
  pointer-events: none;
}

.power-accent-slab {
  display: none;
}

.power-logo-big {
  position: absolute;
  left: 35px;
  top: 20px;
  width: 720px;
  height: 710px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}

.power-logo-big img {
  max-width: 720px;
  max-height: 710px;
  object-fit: contain;
  filter: drop-shadow(0 18px 20px rgba(0,0,0,.45));
}

.power-logo-fallback {
  width: 620px;
  height: 620px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 110px;
  font-weight: 1000;
  border-radius: 28px;
  background: rgba(255,255,255,.08);
}

.power-content {
  position: absolute;
  left: 835px;
  top: 70px;
  right: 110px;
  bottom: 70px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.power-team-name {
  font-size: 116px;
  font-weight: 1000;
  letter-spacing: 2px;
  white-space: nowrap;
  text-shadow: 0 8px 14px rgba(0,0,0,.42);
  margin-bottom: 34px;
}

.power-stats-line {
  display: flex;
  align-items: center;
  gap: 58px;
  font-weight: 1000;
  text-shadow: 0 5px 9px rgba(0,0,0,.35);
  margin-bottom: 58px;
}

.stat-block {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.stat-label {
  font-size: 30px;
  opacity: .78;
  letter-spacing: 1px;
}

.stat-value {
  font-size: 58px;
  line-height: 1;
}

.move-up { color: #22c55e; }
.move-down { color: #ef4444; }
.move-same { color: #e5e7eb; }

.power-analysts {
  display: flex;
  gap: 22px;
  justify-content: flex-start;
  align-items: center;
  flex-wrap: wrap;
  max-width: 1950px;
}

.analyst-vote {
  min-width: 260px;
  height: 90px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 24px;

  border-radius: 16px;

  background:
    linear-gradient(
      180deg,
      rgba(15,23,42,.95),
      rgba(15,23,42,.78)
    );

  border: 2px solid rgba(255,255,255,.10);

  box-shadow:
    0 10px 22px rgba(0,0,0,.40),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.vote-name {
  font-size: 34px;
  font-weight: 900;
  white-space: nowrap;
  line-height: 1;
  min-width: 0;

  text-shadow:
    0 3px 6px rgba(0,0,0,.75);
}

.vote-rank {
  font-size: 42px;
  font-weight: 1000;

  line-height: 1;
  text-align: center;

  font-variant-numeric: tabular-nums;

  min-width: 80px;

  text-shadow:
    0 3px 6px rgba(0,0,0,.75);
}

.card-actions {
  display: flex !important;
  gap: 12px;
  margin-bottom: 14px;
  position: relative;
  z-index: 9999;
}

/* =========================
   ARTICLE MATCHUP HEADER
========================= */

.match-card {
  width: 1500px;
  height: 430px;
  transform: scale(.68);
  transform-origin: top center;
  margin-bottom: -110px;

  position: relative;
  overflow: hidden;
  border-radius: 22px;
  border: 5px solid rgba(255,255,255,.10);

  background:
    radial-gradient(circle at 18% 35%, rgba(148,163,184,.18), transparent 34%),
    radial-gradient(circle at 82% 72%, rgba(148,163,184,.12), transparent 36%),
    linear-gradient(115deg, #1f2937 0%, #020617 48%, #111827 100%);
}

.match-card::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      120deg,
      rgba(180,190,205,.16) 0 11%,
      transparent 11% 24%
    ),

    linear-gradient(
      120deg,
      transparent 0 42%,
      rgba(180,190,205,.08) 42% 58%,
      transparent 58% 100%
    ),

    linear-gradient(
      120deg,
      transparent 0 70%,
      rgba(180,190,205,.10) 70% 82%,
      transparent 82% 100%
    ),

    repeating-linear-gradient(
      120deg,
      rgba(255,255,255,.020) 0px,
      rgba(255,255,255,.020) 2px,
      transparent 2px,
      transparent 34px
    );

  opacity: .95;
  pointer-events: none;
  z-index: 1;
}

.match-card::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 38%),
    linear-gradient(180deg, rgba(255,255,255,.04), transparent 40%, rgba(0,0,0,.20));

  opacity: .7;
  pointer-events: none;
  z-index: 2;
}

.prediction-grid {
  position: absolute;
  inset: 38px 42px;
  z-index: 10;

  display: grid;
  grid-template-columns: 390px 1fr;
  gap: 24px;
  align-items: center;
}

.matchup-cell {
  height: 330px;
  border-radius: 18px;

  background:
    linear-gradient(
      180deg,
      rgba(15,23,42,.96),
      rgba(15,23,42,.76)
    );

  border: 2px solid rgba(255,255,255,.12);

  display: grid;
  grid-template-columns: 1fr 64px 1fr;
  align-items: center;
  justify-items: center;

  box-shadow:
    0 12px 24px rgba(0,0,0,.42),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.mini-team {
  position: relative;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  font-size: 34px;
  font-weight: 1000;
  text-shadow: 0 4px 8px rgba(0,0,0,.70);
}

.mini-team::before {
  content: "";
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);

  width: 170px;
  height: 170px;
  border-radius: 999px;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,.20),
      rgba(148,163,184,.10) 35%,
      transparent 72%
    );

  z-index: -1;
  pointer-events: none;
}

.mini-team img {
  width: 130px;
  height: 130px;
  object-fit: contain;

  filter:
    drop-shadow(0 0 14px rgba(255,255,255,.18))
    drop-shadow(0 8px 10px rgba(0,0,0,.60));
}

.mini-vs {
  font-size: 48px;
  font-weight: 1000;
  text-shadow:
    0 5px 10px rgba(0,0,0,.80),
    0 0 16px rgba(255,255,255,.16);
}

.prediction-picks-wrap {
  min-height: 330px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  gap: 20px;
}

.prediction-pick-row {
  display: flex;
  justify-content: center;
  align-items: center;

  gap: 20px;
  width: 100%;
}

.prediction-pick-card {
  width: 185px;
  height: 165px;
  border-radius: 18px;

  background:
    radial-gradient(
      circle at 50% 68%,
      rgba(255,255,255,.12),
      transparent 48%
    ),
    linear-gradient(
      180deg,
      rgba(15,23,42,.98),
      rgba(15,23,42,.78)
    );

  border: 2px solid rgba(255,255,255,.13);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;

  box-shadow:
    0 12px 24px rgba(0,0,0,.42),
    inset 0 1px 0 rgba(255,255,255,.09);
}

.prediction-name {
  width: 100%;
  padding: 0 10px;

  font-size: var(--analyst-font, 26px);
  font-weight: 1000;

  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

  text-shadow:
    0 3px 6px rgba(0,0,0,.80),
    0 0 10px rgba(255,255,255,.10);
}

.prediction-pick-card img {
  width: var(--pick-logo-size, 86px);
  height: var(--pick-logo-size, 86px);
  object-fit: contain;

  filter:
    drop-shadow(0 0 12px rgba(255,255,255,.16))
    drop-shadow(0 8px 10px rgba(0,0,0,.60));
}

.match-logo-fallback {
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 1000;
  border-radius: 18px;
  background: rgba(255,255,255,.08);
}

.card-copy-overlay {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 999;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-weight: 900;
  cursor: pointer;
  background: #16a34a;
  color: white;
}

.card-copy-overlay:hover {
  filter: brightness(1.1);
}

.update-graphics-btn {
  background: rgba(34,197,94,.22) !important;
  border-color: rgba(34,197,94,.65) !important;
}

.update-graphics-btn:hover {
  filter: brightness(1.12);
}


/* =========================
   ARTICLE VIEW
========================= */

.article-toolbar {
  width: 1080px;
  max-width: calc(100vw - 48px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  margin: 0 auto 26px;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(15,23,42,.78);
  box-shadow: 0 12px 28px rgba(0,0,0,.28);
}

.article-toolbar-title {
  font-size: 22px;
  font-weight: 1000;
  letter-spacing: .5px;
}

.article-toolbar-note {
  font-size: 14px;
  font-weight: 800;
  opacity: .68;
  margin-top: 4px;
}

.article-toolbar button,
.article-copy-btn {
  border: 1px solid rgba(34,197,94,.65);
  background: rgba(34,197,94,.22);
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  font-weight: 900;
  cursor: pointer;
}

.article-toolbar button:hover,
.article-copy-btn:hover {
  filter: brightness(1.12);
}

.article-item {
  width: 3000px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 58px;
}

.article-text-box {
  width: 1080px;
  max-width: calc(100vw - 48px);
  margin-top: 20px;
  padding: 24px 28px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.14);
  background:
    radial-gradient(circle at 8% 0%, rgba(96,165,250,.14), transparent 32%),
    linear-gradient(135deg, rgba(15,23,42,.96), rgba(2,6,23,.92));
  box-shadow:
    0 18px 34px rgba(0,0,0,.32),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.article-rank-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  font-size: 25px;
  font-weight: 1000;
  margin-bottom: 16px;
  letter-spacing: .5px;
}

.article-blurb {
  font-size: 19px;
  line-height: 1.42;
  font-weight: 700;
  color: rgba(255,255,255,.90);
  margin: 12px 0;
}

.article-writer {
  font-weight: 1000;
  color: white;
}

.article-empty {
  font-size: 18px;
  font-weight: 800;
  opacity: .66;
}

.blank-sheet-card {
  width: 760px;
  min-height: 155px;
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,.12);

  background:
    radial-gradient(circle at 20% 30%, rgba(148,163,184,.18), transparent 35%),
    linear-gradient(135deg, rgba(15,23,42,.96), rgba(2,6,23,.92));

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;

  box-shadow:
    0 18px 34px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.08);

  text-align: center;
}

.blank-sheet-title {
  font-size: 32px;
  font-weight: 1000;
  letter-spacing: 1px;
}

.blank-sheet-text {
  font-size: 18px;
  font-weight: 800;
  opacity: .72;
}
</style>
</head>

<body>

<div class="header">CSC GRAPHIC GENERATOR</div>

<div class="menu">
  <div class="tier-control">
    <span>Tier:</span>
    <select id="tierSelect"></select>
  </div>

  <button class="active" onclick="showPage('power', this)">Power Rankings</button>
  <button onclick="showPage('matches', this)">Matchups</button>
  <button onclick="showPage('article', this)">Article View</button>

  <button class="update-graphics-btn" onclick="updateGraphicsFromSheets()">
    Update Graphics
  </button>
</div>

<div id="status" class="status">Loading graphics...</div>

<div id="power-page" class="page active">
  <div id="powerGallery" class="gallery"></div>
</div>

<div id="matches-page" class="page">
  <div id="matchGallery" class="gallery"></div>
</div>

<div id="article-page" class="page">
  <div id="articleGallery" class="gallery"></div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
const POWER_TAB = "Master Data";
const PICKS_TAB = "Picks/Records";
const FINAL_TAB = "Final";
const YAP_TAB = "Yap";

const LOGO_FOLDER = "logos";
const LOGO_EXTENSION = "png";

const logosURL = "https://opensheet.elk.sh/1vx2l-UI_eUlrz8b6f3vca24tUAfqO5w8_kmZsHxVSmw/logos";

let colorDataCache = null;

const TIER_ORDER = [
  "Recruit",
  "Prospect",
  "Contender",
  "Challenger",
  "Elite",
  "Premier"
];

const CONFIG_SHEET_URL = "https://docs.google.com/spreadsheets/d/1dCGPRYudr0X5ektYEA55WWwAxRax5zSdqzjoddAM0QE/edit?usp=sharing";
const CONFIG_TAB = "Config";

let TIER_CONFIG = {};

let currentTier = "Premier";
let teamStyles = {};
let teamLogos = {};
let teamColorCache = {};
let currentArticleTextBlocks = [];

const defaultStyle = {
  primary: "#334155",
  secondary: "#0f172a",
  accent: "#64748b",
  accent2: "#475569",
  detail: "#94a3b8",
  dark: "#020617"
};

function normalizeHex(value, fallback) {
  let hex = String(value || "").trim();

  if (!hex) return fallback;

  if (!hex.startsWith("#")) hex = "#" + hex;

  return /^#[0-9a-fA-F]{6}$/.test(hex) ? hex.toUpperCase() : fallback;
}
function showBlankMatchupsMessage() {
  const gallery = document.getElementById("matchGallery");

  gallery.innerHTML = `
    <div class="blank-sheet-card">
      <div class="blank-sheet-title">Document Currently Blank</div>
      <div class="blank-sheet-text">Add matchups to the sheet, then hit Update Graphics.</div>
    </div>
  `;
}
function parseTeamColors(row) {
  const raw = String(
    row.Color ||
    row.color ||
    row.Colors ||
    row.colors ||
    ""
  ).trim();

  let colors = raw
    .split(",")
    .map(c => c.trim())
    .filter(Boolean)
    .map(c => normalizeHex(c, ""))
    .filter(Boolean);

  const primary = colors[0] || defaultStyle.primary;
  const secondary = colors[1] || primary;
  const accent = colors[2] || secondary;
  const accent2 = colors[3] || accent;
  const detail = colors[4] || accent2;
  const dark = "#020617";

  return { primary, secondary, accent, accent2, detail, dark };
}
function extractGoogleSheetId(value) {
  const text = String(value || "").trim();

  const match = text.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);

  if (match) return match[1];

  if (/^[a-zA-Z0-9-_]{20,}$/.test(text)) return text;

  return "";
}

function getRowValue(row, possibleHeaders) {
  const actualKey = Object.keys(row).find(key =>
    possibleHeaders.some(header =>
      String(key || "").trim().toLowerCase() === String(header || "").trim().toLowerCase()
    )
  );

  return actualKey ? row[actualKey] : "";
}

async function loadTierConfig() {
  const configId = extractGoogleSheetId(CONFIG_SHEET_URL);

  if (!configId) {
    throw new Error("Config sheet URL is invalid.");
  }

  const configURL = openSheetURL(configId, CONFIG_TAB);
  const rows = await fetchSheetData(configURL, "Tier Config");

  const nextConfig = {};

  rows.forEach(row => {
    const rawTier = String(getRowValue(row, [
      "Tier",
      "Tier Name"
    ])).trim();

    const tier = TIER_ORDER.find(t =>
      t.toLowerCase() === rawTier.toLowerCase()
    ) || rawTier;

    const rankingsId = extractGoogleSheetId(getRowValue(row, [
      "Power Rankings Link",
      "Power Ranking Link",
      "Power Rankings",
      "Power Ranking",
      "Rankings",
      "Ranking",
      "PR"
    ]));

    const picksId = extractGoogleSheetId(getRowValue(row, [
      "Predictions Link",
      "Prediction Link",
      "Predictions",
      "Prediction",
      "Picks",
      "Picks Link"
    ]));

    if (!tier || !rankingsId || !picksId) return;

    nextConfig[tier] = {
      rankingsId,
      picksId
    };
  });

  if (!Object.keys(nextConfig).length) {
    throw new Error("No valid tier links found in the config sheet.");
  }

  TIER_CONFIG = nextConfig;

  console.log("LOADED TIER CONFIG:", TIER_CONFIG);
}
async function fetchColorData() {
  if (colorDataCache) return colorDataCache;

  try {
    const data = await fetchSheetData(COLORS_URL, "Colors");
    colorDataCache = data;
    return colorDataCache;
  } catch (err) {
    console.warn("Team colors failed to load. Falling back to logo color extraction.", err);
    colorDataCache = [];
    return colorDataCache;
  }
}

function buildColorMap(colorData) {
  const colorMap = {};

  colorData.forEach(row => {
    const team = String(
      row["Team Name"] ||
      row.Team ||
      row.Teams ||
      row.TEAM ||
      ""
    ).trim().toUpperCase();

    if (!team) return;

    colorMap[team] = parseTeamColors(row);
  });

  console.log("COLOR MAP:", colorMap);

  return colorMap;
}

function openSheetURL(sheetId, tabName) {
  return `https://opensheet.elk.sh/${sheetId}/${encodeURIComponent(tabName)}`;
}

function localLogoPath(team) {
  const key = String(team || "").trim().toUpperCase();
  return `${LOGO_FOLDER}/${key}.${LOGO_EXTENSION}`;
}

function tierCacheKey(tierName) {

async function fetchSheetData(url, label) {

      cache: "no-store"
    });

    if (!response.ok) {
      throw new Error(`${label} failed to load through OpenSheet. Status: ${response.status}`);
    }

    if (!Array.isArray(data)) {
      throw new Error(`${label} did not return rows.`);
    }

    return data;
  } catch (openSheetErr) {
    const sheetInfo = extractOpenSheetInfo(url);

    if (!sheetInfo) {
      throw openSheetErr;
    }

    console.warn(`${label} OpenSheet pull failed. Trying Google CSV fallback.`, openSheetErr);

    const csvRows = await fetchCsvRowsOnly(
      sheetInfo.sheetId,

function csvSheetURL(sheetId, tabName) {
  return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
}

function parseCSV(text) {
  const cleanText = String(text || "").replace(/^\uFEFF/, "");
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < cleanText.length; i++) {
    const char = cleanText[i];
    const next = cleanText[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
      continue;
    }

    if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
      continue;
    }

    cell += char;
  }

  row.push(cell);
  rows.push(row);

  return rows.filter(r => r.some(c => String(c || "").trim()));
}

async function fetchRawSheetRows(sheetId, tabName, label) {

function cleanArticleLine(value) {

function parseWriterBlurb(line) {
  const writerRankMatch = line.match(/^(.+?)\s*#\s*(\d+(?:\.\d+)?)\s*:\s*(.+)$/);

  if (writerRankMatch) {
    return {
      writer: writerRankMatch[1].trim(),
      rank: writerRankMatch[2].trim(),
      text: writerRankMatch[3].trim(),
      raw: `${writerRankMatch[1].trim()} #${writerRankMatch[2].trim()}: ${writerRankMatch[3].trim()}`
    };
  }

  const colonIndex = line.indexOf(":");

  if (colonIndex > -1) {
    return {
      writer: line.slice(0, colonIndex).trim(),
      rank: "",
      text: line.slice(colonIndex + 1).trim(),
      raw: line
    };
  }

  return {
    writer: "",
    rank: "",
    text: line,
    raw: line
  };
}

function parseFinalArticleRows(finalRows) {
  const sections = {};
  let current = null;

  finalRows.forEach(row => {
    const firstCell = getFirstNonEmptyCell(row);
    if (!firstCell) return;

    const lines = String(firstCell)
      .split(/\r?\n/)
      .map(cleanArticleLine)
      .filter(Boolean);

    lines.forEach(line => {
      const rankMatch = line.match(/^Rank\s*#?\s*(\d+)\s*:\s*(.+)$/i);

      if (rankMatch) {
        const rank = rankMatch[1].trim();
        const team = rankMatch[2].trim().toUpperCase();

        if (sections[team]) {
          current = null;
          return;
        }

        current = {
          rank,
          team,
          blurbs: [],
          rawLines: [`Rank ${rank}: ${team}`]
        };

        sections[team] = current;
        return;
      }

      if (!current) return;

      const blurb = parseWriterBlurb(line);
      if (!blurb.text) return;

      current.blurbs.push(blurb);
      current.rawLines.push(blurb.raw);
    });
  });

  return sections;
}

function getSortedPowerData(data) {

    if (rankA !== rankB) return rankA - rankB;

    const teamA = String(a.Teams || a.Team || "");
    const teamB = String(b.Teams || b.Team || "");

    return teamA.localeCompare(teamB);

}

}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b]
    .map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0"))
    .join("")
    .toUpperCase();
}

function hexToRgb(hex) {
  const clean = String(hex || "").replace("#", "");

  if (!/^[0-9a-fA-F]{6}$/.test(clean)) {
    return { r: 51, g: 65, b: 85 };
  }

  return {
    r: parseInt(clean.slice(0, 2), 16),
    g: parseInt(clean.slice(2, 4), 16),
    b: parseInt(clean.slice(4, 6), 16)
  };
}

function rgbToHsl(r, g, b) {
  r /= 255;
  g /= 255;
  b /= 255;

  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);

  let h = 0;
  let s = 0;
  const l = (max + min) / 2;

  if (max !== min) {
    const d = max - min;

    s = l > .5
      ? d / (2 - max - min)
      : d / (max + min);

    switch (max) {
      case r:
        h = (g - b) / d + (g < b ? 6 : 0);
        break;
      case g:
        h = (b - r) / d + 2;
        break;
      case b:
        h = (r - g) / d + 4;
        break;
    }

    h /= 6;
  }

  return { h, s, l };
}

function colorDistance(a, b) {
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);

  return Math.sqrt(
    Math.pow(ca.r - cb.r, 2) +
    Math.pow(ca.g - cb.g, 2) +
    Math.pow(ca.b - cb.b, 2)
  );
}

function darkenHex(hex, amount = .45) {
  const rgb = hexToRgb(hex);

  return rgbToHex(
    rgb.r * amount,
    rgb.g * amount,
    rgb.b * amount
  );
}

function softenHex(hex, amount = .75) {
  const rgb = hexToRgb(hex);

  return rgbToHex(
    rgb.r * amount + 20,
    rgb.g * amount + 20,
    rgb.b * amount + 20
  );
}

async function extractColorsFromLogo(team) {
  const key = String(team || "").trim().toUpperCase();

  if (teamColorCache[key]) {
    return teamColorCache[key];
  }

  const src = localLogoPath(key);

  try {
    const img = await loadImage(src);

    const canvas = document.createElement("canvas");
    const size = 72;

    canvas.width = size;
    canvas.height = size;

    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);

    const pixels = ctx.getImageData(0, 0, size, size).data;
    const buckets = new Map();

    for (let i = 0; i < pixels.length; i += 4) {
      const r = pixels[i];
      const g = pixels[i + 1];
      const b = pixels[i + 2];
      const a = pixels[i + 3];

      if (a < 90) continue;

      const hsl = rgbToHsl(r, g, b);

      if (hsl.l < .06) continue;
      if (hsl.l > .94 && hsl.s < .25) continue;

      const qr = Math.round(r / 24) * 24;
      const qg = Math.round(g / 24) * 24;
      const qb = Math.round(b / 24) * 24;

      const bucketKey = `${qr},${qg},${qb}`;
      const weight = (a / 255) * (.45 + hsl.s * 1.35) * (.75 + Math.abs(.52 - hsl.l));

      const current = buckets.get(bucketKey) || {
        r: 0,
        g: 0,
        b: 0,
        weight: 0
      };

      current.r += r * weight;
      current.g += g * weight;
      current.b += b * weight;
      current.weight += weight;

      buckets.set(bucketKey, current);
    }

    const colors = Array.from(buckets.values())
      .filter(bucket => bucket.weight > 0)
      .map(bucket => {
        const r = bucket.r / bucket.weight;
        const g = bucket.g / bucket.weight;
        const b = bucket.b / bucket.weight;

        return {
          hex: rgbToHex(r, g, b),
          weight: bucket.weight
        };
      })
      .sort((a, b) => b.weight - a.weight);

    if (!colors.length) {
      teamColorCache[key] = defaultStyle;
      return defaultStyle;
    }

    const primary = colors[0].hex;

    let secondary = colors.find(c => colorDistance(c.hex, primary) > 95)?.hex;
    let accent = colors.find(c =>
      colorDistance(c.hex, primary) > 65 &&
      (!secondary || colorDistance(c.hex, secondary) > 65)
    )?.hex;

    if (!secondary) secondary = darkenHex(primary, .38);
    if (!accent) accent = softenHex(primary, .82);

    const style = {
      primary,
      secondary,
      accent,
      accent2: darkenHex(secondary, .72),
      detail: accent,
      dark: "#020617"
    };

    teamColorCache[key] = style;
    return style;
  } catch (err) {
    console.warn(err.message);

    teamColorCache[key] = defaultStyle;
    return defaultStyle;
  }
}

function formatMovementValue(value, lastWeek, currentRank) {
  const raw = String(value || "").trim();
  const lastRaw = String(lastWeek || "").trim();
  const currentRaw = String(currentRank || "").trim();

  const hasLastWeek = lastRaw && lastRaw !== "-" && lastRaw !== "—";
  const hasCurrentRank = currentRaw && currentRaw !== "-" && currentRaw !== "—";

  if (!hasLastWeek || !hasCurrentRank) {
    return `<span class="move-same">-</span>`;
  }

  if (!raw || raw === "-" || raw === "—") {
    return `<span class="move-same">-</span>`;
  }

  const clean = raw.replace("#", "").trim();
  const lowered = clean.toLowerCase();

  if (["0", "same", "-", "—", "--", "none"].includes(lowered)) {
    return `<span class="move-same">-</span>`;
  }

  const numberMatch = clean.match(/-?\d+(\.\d+)?/);

  if (lowered.includes("up") || clean.includes("▲") || clean.includes("↑") || clean.startsWith("+")) {
    const num = numberMatch ? Math.abs(Number(numberMatch[0])) : "";
    return num ? `<span class="move-up">▲${num}</span>` : `<span class="move-same">-</span>`;
  }

  if (lowered.includes("down") || clean.includes("▼") || clean.includes("↓") || clean.startsWith("-")) {
    const num = numberMatch ? Math.abs(Number(numberMatch[0])) : "";
    return num ? `<span class="move-down">▼${num}</span>` : `<span class="move-same">-</span>`;
  }

  if (numberMatch) {
    const num = Number(numberMatch[0]);

    if (num > 0) return `<span class="move-up">▲${num}</span>`;
    if (num < 0) return `<span class="move-down">▼${Math.abs(num)}</span>`;

    return `<span class="move-same">-</span>`;
  }

  return `<span class="move-same">-</span>`;
}

    "Prev Rank"

    "Move",

  ]);

    "Teams",

    "Current Rank",
    "Rank",
    "Ranking",
    "Last Week",
    "Last Week Rank",
    "Previous Rank",
    "Prev Rank",
    "Movement",
    "Move",
    "Rank Movement",
    "Writeup",
    "Write Up",
    "Write-Up",
    "Blurb",

    "Comments",

    "Reasoning",

  ];

  const analystHTML = analysts.map(a => {

        --team-detail:${style.detail};
        --team-dark:${style.dark};
      "
    >
      <button class="card-copy-overlay" onclick="copyCard('${cardId}', this)">Copy</button>

      <div class="power-accent-slab"></div>

      <div class="power-logo-big">
        ${logo(team, teamLogos)}
      </div>

      <div class="power-content">
        <div class="power-team-name">${escapeHTML(team)}</div>

        <div class="power-stats-line">

            <span class="stat-label">RANKING:</span>

function articleTextForSection(team, section, fallbackRank) {
  if (!section) {
    return `Rank ${fallbackRank || ""}: ${team}\nNo writeups found in the Final tab.`.trim();
  }

  return section.rawLines.join("\n").trim();
}

function buildArticleView(rankData, finalRows) {
  const gallery = document.getElementById("articleGallery");
  gallery.innerHTML = "";
  currentArticleTextBlocks = [];

  const articleSections = parseFinalArticleRows(finalRows || []);
  const sortedData = getSortedPowerData(rankData);

  const toolbar = document.createElement("div");
  toolbar.className = "article-toolbar";
  toolbar.innerHTML = `
    <div>
      <div class="article-toolbar-title">Power Rankings Article View</div>
      <div class="article-toolbar-note">Graphic first, then the Final tab writeups underneath.</div>
    </div>
    <button onclick="copyFullArticleText(this)">Copy Full Article</button>
  `;
  gallery.appendChild(toolbar);

  sortedData.forEach((row, index) => {
    const team = String(row.Teams || row.Team || "").trim().toUpperCase();
    if (!team) return;

    const finalRank = cleanRankValue(getPowerColumn(row, [
      "Final Rank",
      "Current Rank",
      "Rank",
      "Ranking"
    ]));

    const section = articleSections[team];
    const copyText = articleTextForSection(team, section, finalRank);
    const copyIndex = currentArticleTextBlocks.length;
    currentArticleTextBlocks.push(copyText);

    let blurbsHTML = `<div class="article-empty">No writeups found in the Final tab for ${escapeHTML(team)}.</div>`;

    if (section && section.blurbs.length) {
      blurbsHTML = section.blurbs.map(blurb => {
        const writerLabel = blurb.writer
          ? `${escapeHTML(blurb.writer)}${blurb.rank ? ` #${escapeHTML(blurb.rank)}` : ""}`
          : "Writer";

        return `
          <div class="article-blurb">
            <span class="article-writer">${writerLabel}:</span>
            ${escapeHTML(blurb.text)}
          </div>
        `;
      }).join("");
    }

    const item = document.createElement("div");
    item.className = "article-item";
    item.innerHTML = `
      ${buildPowerArticleGraphicHTML(row, index)}

      <div class="article-text-box">
        <div class="article-rank-title">
          <span>${escapeHTML(section ? `Rank ${section.rank}: ${section.team}` : `Rank ${finalRank}: ${team}`)}</span>
          <button class="article-copy-btn" onclick="copyTeamArticleText(${copyIndex}, this)">Copy Text</button>
        </div>

        ${blurbsHTML}
      </div>
    `;

    gallery.appendChild(item);
  });

  setTimeout(() => {
    resizeTeamNames();
    resizeAnalysts();
  }, 150);
}

function articlePlainTextToHTML(text) {
  const lines = String(text || "")
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean);

  if (!lines.length) return "";

  return lines.map((line, index) => {
    const safeLine = escapeHTML(line);

    if (index === 0 && /^Rank\s+/i.test(line)) {
      return `<h3 style="margin:18px 0 10px;font-family:Arial,sans-serif;font-size:20px;line-height:1.25;color:#111827;">${safeLine}</h3>`;
    }

    const colonIndex = safeLine.indexOf(":");

    if (colonIndex > -1) {
      const label = safeLine.slice(0, colonIndex + 1);
      const body = safeLine.slice(colonIndex + 1).trim();

      return `<p style="margin:10px 0;font-family:Arial,sans-serif;font-size:15px;line-height:1.45;color:#111827;"><strong>${label}</strong> ${body}</p>`;
    }

    return `<p style="margin:10px 0;font-family:Arial,sans-serif;font-size:15px;line-height:1.45;color:#111827;">${safeLine}</p>`;
  }).join("");
}

async function powerCardToDataURL(card) {
  if (!card) throw new Error("Article graphic card not found.");

  const canvas = await renderToCanvas(card);
  return canvas.toDataURL("image/png");
}

async function buildFullArticleClipboardHTML(button) {
  const articleItems = Array.from(document.querySelectorAll("#articleGallery .article-item"));

  if (!articleItems.length) {
    throw new Error("No article sections found.");
  }

  const htmlBlocks = [];

  for (let i = 0; i < articleItems.length; i++) {
    if (button) button.innerText = `Copying ${i + 1}/${articleItems.length}...`;

    const item = articleItems[i];
    const card = item.querySelector(".power-card");
    const dataURL = await powerCardToDataURL(card);
    const text = currentArticleTextBlocks[i] || "";

    htmlBlocks.push(`
      <div style="margin:0 0 34px 0;page-break-inside:avoid;break-inside:avoid;">
        <img src="${dataURL}" alt="Power ranking graphic" style="display:block;width:900px;max-width:100%;height:auto;margin:0 0 14px 0;border:0;">
        <div style="font-family:Arial,sans-serif;color:#111827;">
          ${articlePlainTextToHTML(text)}
        </div>
      </div>
    `);
  }

  return `
    <!DOCTYPE html>
    <html>
      <head>
        <meta charset="UTF-8">
      </head>
      <body>
        ${htmlBlocks.join("")} 
      </body>
    </html>
  `;
}

async function copyFullArticleText(button) {
  const originalText = button ? button.innerText : "";

  try {
    const plainText = currentArticleTextBlocks.join("\n\n").trim();

    if (!plainText) throw new Error("No article text found.");

    const html = await buildFullArticleClipboardHTML(button);

    await navigator.clipboard.write([
      new ClipboardItem({
        "text/html": new Blob([html], { type: "text/html" }),
        "text/plain": new Blob([plainText], { type: "text/plain" })
      })
    ]);

    if (button) {
      button.innerText = "Copied!";
      setTimeout(() => button.innerText = originalText, 1200);
    }
  } catch (err) {
    console.error("ARTICLE COPY ERROR:", err);

    try {
      const plainText = currentArticleTextBlocks.join("\n\n").trim();
      if (plainText) await navigator.clipboard.writeText(plainText);

      if (button) {
        button.innerText = "Copied Text Only";
        setTimeout(() => button.innerText = originalText, 1600);
      }

      alert("Full article rich copy failed, so I copied the text only. Error: " + err.message);
    } catch (fallbackErr) {
      if (button) button.innerText = originalText;
      alert("Article copy failed: " + err.message);
    }
  }
}

async function copyTeamArticleText(index, button) {
  try {
    const text = currentArticleTextBlocks[index] || "";

    if (!text.trim()) throw new Error("No article text found for this team.");

    await navigator.clipboard.writeText(text);

    if (button) {
      const oldText = button.innerText;
      button.innerText = "Copied!";
      setTimeout(() => button.innerText = oldText, 1200);
    }
  } catch (err) {
    console.error("TEAM ARTICLE COPY ERROR:", err);
    alert("Article copy failed: " + err.message);
  }
}

function splitIntoBalancedRows(items) {
  const count = items.length;

  if (count <= 3) return [items];
  if (count === 4) return [items.slice(0, 2), items.slice(2)];
  if (count === 5) return [items.slice(0, 3), items.slice(3)];
  if (count === 6) return [items.slice(0, 3), items.slice(3)];
  if (count === 7) return [items.slice(0, 4), items.slice(4)];
  if (count === 8) return [items.slice(0, 4), items.slice(4)];

  const midpoint = Math.ceil(count / 2);

  return [
    items.slice(0, midpoint),
    items.slice(midpoint)
  ];
}

function buildMatchCards(data) {
  const gallery = document.getElementById("matchGallery");
  gallery.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    showBlankMatchupsMessage();
    return;
  }

  let renderedCount = 0;

  data.forEach((row, index) => {
    const matchup = getMatchupValue(row);
    if (!matchup) return;

    const parts = matchup.split(/vs/i).map(t => t.trim().toUpperCase());
    const a = parts[0];
    const b = parts[1];
    if (!a || !b) return;

    renderedCount++;

    const cardId = `match_${safeName(a)}_${safeName(b)}_${index}`;

    const analysts = Object.keys(row).filter(k =>
      k !== "Matchup" && String(row[k] || "").trim()
    );

    const analystCount = analysts.length;
    const analystFont = analystCount > 8 ? "20px" : analystCount > 5 ? "23px" : "26px";
    const pickLogoSize = analystCount > 8 ? "72px" : analystCount > 5 ? "82px" : "90px";

    const pickCards = analysts.map(name => {
      const pick = String(row[name] || "").trim().toUpperCase();

      return `
        <div class="prediction-pick-card">
          <div class="prediction-name">${name}</div>
          ${logo(pick, teamLogos, "match-logo-fallback")}
        </div>
      `;
    });

    const rows = splitIntoBalancedRows(pickCards);

    const pickRowsHTML = rows.map(rowItems => `
      <div class="prediction-pick-row">
        ${rowItems.join("")}
      </div>
    `).join("");

    gallery.innerHTML += `
      <div class="graphic-wrap">
        <div
          id="${cardId}"
          class="match-card"
          style="
            --analyst-count:${analystCount};
            --analyst-font:${analystFont};
            --pick-logo-size:${pickLogoSize};
          "
        >
          <button class="card-copy-overlay" onclick="copyCard('${cardId}', this)">Copy</button>

          <div class="prediction-grid">
            <div class="matchup-cell">
              <div class="mini-team">
                ${logo(a, teamLogos, "match-logo-fallback")}
                <div>${a}</div>
              </div>

              <div class="mini-vs">VS</div>

              <div class="mini-team">
                ${logo(b, teamLogos, "match-logo-fallback")}
                <div>${b}</div>
              </div>
            </div>

            <div class="prediction-picks-wrap">
              ${pickRowsHTML}
            </div>
          </div>
        </div>
      </div>
    `;
  });

  if (renderedCount === 0) {
    showBlankMatchupsMessage();
  }
}
function getMatchupValue(row) {
  const keys = Object.keys(row);

  const preferredHeaders = [
    "Matchup",
    "Matchups",
    "Match Up",
    "Match-Up",
    "Match",
    "Game",
    "Column 1"
  ];

  for (const wantedHeader of preferredHeaders) {
    const actualKey = keys.find(k =>
      String(k || "").trim().toLowerCase() === wantedHeader.toLowerCase()
    );

    if (actualKey) {
      const value = String(row[actualKey] || "").trim();

      if (value && /\bvs\b/i.test(value)) {
        return value;
      }
    }
  }

  const firstKey = keys[0];
  if (firstKey) {
    const firstValue = String(row[firstKey] || "").trim();

    if (firstValue && /\bvs\b/i.test(firstValue)) {
      return firstValue;
    }
  }

  const anyVsCell = Object.values(row).find(value =>
    /\bvs\b/i.test(String(value || ""))
  );

  return anyVsCell ? String(anyVsCell).trim() : "";
}
function setupTierDropdown() {
  const select = document.getElementById("tierSelect");

  const orderedTiers = TIER_ORDER.filter(tier => TIER_CONFIG[tier]);
  const extraTiers = Object.keys(TIER_CONFIG).filter(tier => !orderedTiers.includes(tier));
  const tiersToShow = [...orderedTiers, ...extraTiers];

  if (!TIER_CONFIG[currentTier]) {
    currentTier = tiersToShow[0] || currentTier;
  }

  select.innerHTML = tiersToShow
    .map(tier => `<option value="${tier}">${tier}</option>`)
    .join("");

  select.value = currentTier;

  select.onchange = () => {
    loadTier(select.value, false);
  };
}
function renderTierData(tierName, rankData, matchData, finalRows = [], savedAt) {
  buildPowerCards(rankData);
  buildMatchCards(matchData);
  buildArticleView(rankData, finalRows);

  const message = savedAt
    ? `${tierName} graphics loaded from saved data. Last updated: ${formatSavedTime(savedAt)}.`
    : `${tierName} graphics loaded.`;

  document.getElementById("status").innerText = message;
}
function getFinalRankNumber(row) {
  const raw = String(row["Final Rank"] || "")
    .trim()
    .replace("#", "");

  const num = Number(raw);

  return Number.isFinite(num) ? num : 9999;
}

try {

    document.getElementById("status").innerText = `Loading ${tierName} logos...`;

async function updateGraphicsFromSheets() {
  try {
    document.getElementById("status").innerText = "Refreshing tier config...";

    await loadTierConfig();

    setupTierDropdown();

  } catch (err) {
