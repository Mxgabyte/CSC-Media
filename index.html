<!DOCTYPE html>
<html>
<head>
<title>CSC Media Hub</title>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="app-shell">
  <aside class="app-sidebar">
    <button id="sidebarHideButton" class="sidebar-hide-button" onclick="toggleSidebar()">Hide Controls</button>

    <div class="brand-block">
      <div class="brand-kicker">CSC MEDIA</div>
      <div class="brand-title">Article Hub</div>
      <div class="brand-subtitle">Power Rankings + Predictions</div>
    </div>

    <label class="control-label" for="tierSelect">Tier</label>
    <select id="tierSelect" class="sidebar-select"></select>

    <div class="sidebar-nav" role="tablist" aria-label="Article views">
      <button id="navPower" class="nav-button active" onclick="setView('article')">Power Rankings</button>
      <button id="navPredictions" class="nav-button" onclick="setView('predictionArticle')">Predictions</button>
    </div>

    <div class="sidebar-section">
      <div class="publish-button-row">
        <button id="refreshDraftButton" class="primary-action" onclick="refreshDraftFromSheets(this)">Refresh Draft</button>
        <button id="publishDraftButton" class="secondary-action" onclick="publishDraftData(this)">Publish Draft</button>
      </div>
      <div id="publishStatus" class="publish-status">Published data will stay live until you publish a refreshed draft.</div>
      <button id="publishModeButton" class="secondary-action publish-mode-button" onclick="togglePublishMode()">Enter Publish Mode</button>

      <label class="control-label" for="copyActionSelect">Article Action</label>
      <div class="action-runner">
        <select id="copyActionSelect" class="sidebar-select">
          <option value="rich">Copy Rich Article</option>
          <option value="text">Copy Text Only</option>
          <option value="discord">Copy Discord Article</option>
          <option value="html">Export HTML</option>
        </select>
        <button class="secondary-action" onclick="runSelectedArticleAction(this)">Run</button>
      </div>
    </div>

    <div class="sidebar-section">
      <label class="control-label" for="articleSearch">Search</label>
      <input id="articleSearch" class="sidebar-input" type="search" placeholder="Team, writer, matchup..." oninput="applyArticleFilters()" />

      <label class="control-label" for="writerFilter">Writer Focus</label>
      <select id="writerFilter" class="sidebar-select" onchange="applyArticleFilters()">
        <option value="">All writers</option>
      </select>
    </div>

    <div class="sidebar-section sidebar-small-actions">
      <button onclick="expandVisibleSections()">Expand Visible</button>
      <button onclick="collapseVisibleSections()">Collapse Visible</button>
    </div>

    <div class="sidebar-section">
      <button id="debugToggleButton" class="debug-toggle-button" onclick="toggleDebugPanel()">Enable Debug</button>
    </div>

    <details class="debug-details">
      <summary>Load Debug</summary>
      <div id="debugPanel" class="debug-panel"></div>
    </details>
  </aside>

  <main class="app-main">
    <div class="topbar">
      <button id="sidebarOpenButton" class="sidebar-open-button" onclick="toggleSidebar()">☰ Controls</button>
      <div class="topbar-title-block">
        <div id="viewTitle" class="view-title">Power Rankings</div>
        <div id="status" class="status">Loading graphics...</div>
      </div>
    </div>

    <section id="article-page" class="page active">
      <div id="articleGallery" class="gallery article-gallery"></div>
    </section>

    <section id="predictionArticle-page" class="page">
      <div id="predictionArticleGallery" class="gallery article-gallery"></div>
    </section>

    <section id="power-page" class="page utility-hidden">
      <div id="powerGallery" class="gallery"></div>
    </section>

    <section id="matches-page" class="page utility-hidden">
      <div id="matchGallery" class="gallery"></div>
    </section>
  </main>
</div>
<div id="publishViewerBar" class="publish-viewer-bar" aria-label="Published article navigation">
  <div class="publish-viewer-brand">
    <div class="publish-viewer-kicker">CSC MEDIA</div>
    <div class="publish-viewer-title">Article Hub</div>
  </div>

  <div class="publish-viewer-controls">
    <div class="publish-viewer-control-group">
      <div class="publish-viewer-label">Tier</div>
      <div id="publishTierTabs" class="publish-viewer-tabs publish-tier-tabs" role="tablist" aria-label="Published tiers"></div>
    </div>

    <div class="publish-viewer-control-group">
      <div class="publish-viewer-label">Article</div>
      <div class="publish-viewer-tabs publish-article-tabs" role="tablist" aria-label="Published article views">
        <button id="publishNavPower" class="publish-viewer-tab active" onclick="setView('article')">Power Rankings</button>
        <button id="publishNavPredictions" class="publish-viewer-tab" onclick="setView('predictionArticle')">Predictions</button>
      </div>
    </div>
  </div>
</div>

<button id="publishModeExitButton" class="publish-exit-button" onclick="togglePublishMode(false)">Exit Publish Mode</button>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
